# Fallback if Railway uses Nixpacks instead of Dockerfile.terminal.
# Skips `next build` — terminal backend does not need Next.js.

[variables]
HUSKY = "0"
CI = "true"

[phases.setup]
nixPkgs = ["nodejs_22", "python3"]

[phases.install]
cmds = ["npm ci --omit=dev"]

[phases.build]
cmds = []

[start]
cmd = "npm run terminal:server"
